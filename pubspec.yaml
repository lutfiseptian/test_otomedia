name: test_otomedia
description: "otomedia.test"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

flutter:
  uses-material-design: true

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_bloc: ^8.1.3      # Rekomendasi untuk Clean Architecture
  get_it: ^7.6.0            # Dependency Injection

  # Lokasi & Pemetaan
  geolocator: ^11.0.0       # Mengambil lokasi perangkat
  flutter_map: ^6.1.0       # Menampilkan peta (Alternatif OpenStreetMap yang ringan)
  latlong2: ^0.9.1          # Object Koordinat

  # Database Lokal (Offline-First)
  isar: ^3.1.0+1            # Database NoSQL yang sangat cepat untuk Flutter
  isar_flutter_libs: ^3.1.0+1

  # Real-time & Network
  socket_io_client: ^3.1.1  # Integrasi WebSocket/Socket.IO
  connectivity_plus: ^6.0.0 # Cek status internet untuk Auto Sync

  # Background Processing (Bonus)
  flutter_background_service: ^5.0.5 # Menjalankan tracking saat aplikasi ditutup
  path_provider: ^2.1.6

  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8
  flutter_lints: ^6.0.0
